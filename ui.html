<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渐变爱意</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #f6d365);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box {
            max-width: 600px;
            width: 90%;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(8px);
            padding: 50px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(255, 80, 120, 0.2);
            text-align: center;
        }
        h1 {
            font-size: 60px;
            background: linear-gradient(90deg, #ff2e63, #ff758c, #ffd700);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 24px;
            letter-spacing: 6px;
        }
        p {
            color: #662233;
            font-size: 18px;
            line-height: 1.8;
            margin: 12px 0;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            color: white;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s ease;
        }
        button:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>爱你</h1>
        <p>漫天温柔渐变，全部赠予你</p>
        <p>岁岁年年，满心欢喜</p>
        <button onclick="alert('我也超爱你！')">点击接收爱意</button>
    </div>

    <script>
        console.log('满屏渐变爱意已加载完成');
    </script>
</body>
</html>
